<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- PearTune app icon.
       A vinyl record with a tonearm reaching out to a node: the record IS the
       connection. Music, and peer-to-peer, in one mark.

       Derived from the Recraft original (icon7), which was 2048x1509 and left the
       mark at ~33% of the frame. Squared, centred, and scaled to 64% of the tile:
       Android crops adaptive icons to a 66% safe zone, so this sits just inside it
       - big enough to hold its own next to other launcher icons, small enough that
       a circular mask never bites the tonearm off.

       Opaque background, square, no rounded corners: every platform applies its
       OWN corner mask, and Apple rejects an alpha channel outright. -->
  <rect width="1024" height="1024" fill="rgb(24,20,25)"/>
