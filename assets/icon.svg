<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- PearTune app icon (master).
     A pear whose belly is a chrome-bezelled green-LCD spectrum analyzer: the
     PearLoom pear fused with the classic-player retro skin (PR #54). Winamp-
     flavoured, brand-owned, no Nullsoft artwork.

     Built from the Recraft source icon3.svg (2048x1509 canvas). Recraft's own
     dark background path was DROPPED; the mark is cropped to its true bounding
     box and centred in a square tile via a nested svg element, so the mark bbox
     is PERFECTLY centred (equal margins L=R and T=B), fixing the off-centre
     launcher icon. Mark fills 64% of the tile (Android crops adaptive icons to
     a 66% safe zone; this sits just inside it). See adaptive-foreground.svg for
     the 52% Android foreground.

     Opaque background (surface-base #17140f), square, no rounded corners: every
     platform applies its OWN corner mask, and Apple rejects an alpha channel
     outright. -->
  <rect width="1024" height="1024" fill="#17140f"/>
  <svg x="306.865" y="184.320" width="410.270" height="655.360" viewBox="699.171 236.157 650.686 1039.398" preserveAspectRatio="xMidYMid meet">
